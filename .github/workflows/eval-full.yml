name: Eval Full

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  eval-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_MODEL_PROVIDER: ${{ secrets.OPENAI_API_KEY != '' && 'openai' || 'mock' }}
          EVAL_JUDGE_PROVIDER: ${{ secrets.OPENAI_API_KEY != '' && 'openai' || 'mock' }}
          CONTEXT7_MODE: ${{ secrets.CONTEXT7_MODE }}
          CONTEXT7_CMD: ${{ secrets.CONTEXT7_CMD }}
          CONTEXT7_API_URL: ${{ secrets.CONTEXT7_API_URL }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        run: npm run eval:full

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-full
          path: eval/results/*.*
